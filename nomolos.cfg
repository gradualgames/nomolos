MEMORY {
HEADER: start = $0, size = $10, file = %O, fill = no;
ZP:  start = $0, size = $100, type = rw, define = no, fill = no;
STACK: start = $0100, size = $100, type = rw, define = no, fill = no;
RAM: start = $0200, size = $200, type = rw, define = no, fill = no;
ROM0: start = $8000, size = $4000, file = %O ,fill = yes, define = yes;
ROM1: start = $c000, size = $3ffa, file = %O, fill = yes, define = yes;
ROMV: start = $fffa, size = $6, file = %O, fill = no, define = yes;
CHRROM1: start = $0, size = $1000, file = %O, fill = yes;
CHRROM2: start = $1000, size = $1000, file = %O, fill = yes;
}

SEGMENTS {
HEADER:   load = HEADER,          type = ro               , optional = yes;
STACK:    load = STACK,           type = bss,  define = yes, optional = yes;
RAM:      load = RAM,             type = bss,  define = yes, optional = yes;
RODATA:   load = ROM0,            type = ro,  define = yes, optional = yes;
CODE:     load = ROM1,            type = ro,  define = yes, optional = yes;
VECTORS:  load = ROMV,            type = ro,  define = yes, optional = yes;
CHRROM1:   load = CHRROM1,          type = ro,  define = yes, optional = yes;
CHRROM2:   load = CHRROM2,          type = ro,  define = yes, optional = yes;
ZEROPAGE: load = ZP,              type = zp,                optional = yes;
}

