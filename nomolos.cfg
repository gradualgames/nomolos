#Config file for Nomolos

MEMORY
{
  #iNES header
  HEADER:   start = $0,    size = $10,   fill = yes;

  #ram
  ZP:       start = $0,    size = $100,  fill = no;
  STACK:    start = $0100, size = $100,  fill = no;
  RAM:      start = $0200, size = $600,  fill = no;

  #prg-rom
  ROM0:     start = $8000, size = $4000, fill = yes;
  ROM1:     start = $8000, size = $4000, fill = yes;
  ROM2:     start = $8000, size = $4000, fill = yes;
  ROM3:     start = $8000, size = $4000, fill = yes;
  ROM4:     start = $8000, size = $4000, fill = yes;
  ROM5:     start = $8000, size = $4000, fill = yes;
  ROM6:     start = $8000, size = $4000, fill = yes;
  ROM7:     start = $8000, size = $4000, fill = yes;
  ROM8:     start = $8000, size = $4000, fill = yes;
  ROM9:     start = $8000, size = $4000, fill = yes;
  ROM10:    start = $8000, size = $4000, fill = yes;
  ROM11:    start = $8000, size = $4000, fill = yes;
  ROM12:    start = $8000, size = $4000, fill = yes;
  ROM13:    start = $8000, size = $4000, fill = yes;
  ROM14:    start = $8000, size = $4000, fill = yes;

  #fixed prg-rom
  ROM15: start = $c000, size = $3ffa, fill = yes;

  #vectors
  ROMV:     start = $fffa, size = $6,    fill = no;
}

SEGMENTS
{
  #header
  HEADER:   load = HEADER,   type = ro,  optional = yes;

  #ram
  ZEROPAGE: load = ZP,       type = zp,  optional = yes;
  STACK:    load = STACK,    type = bss, optional = yes;
  BSS:      load = RAM,      type = bss, optional = yes;

  #prg-rom
  ROM0:     load = ROM0,     type = ro,  optional = yes;
  ROM1:     load = ROM1,     type = ro,  optional = yes;
  ROM2:     load = ROM2,     type = ro,  optional = yes;
  ROM3:     load = ROM3,     type = ro,  optional = yes;
  ROM4:     load = ROM4,     type = ro,  optional = yes;
  ROM5:     load = ROM5,     type = ro,  optional = yes;
  ROM6:     load = ROM6,     type = ro,  optional = yes;
  ROM7:     load = ROM7,     type = ro,  optional = yes;
  ROM8:     load = ROM8,     type = ro,  optional = yes;
  ROM9:     load = ROM9,     type = ro,  optional = yes;
  ROM10:    load = ROM10,    type = ro,  optional = yes;
  ROM11:    load = ROM11,    type = ro,  optional = yes;
  ROM12:    load = ROM12,    type = ro,  optional = yes;
  ROM13:    load = ROM13,    type = ro,  optional = yes;
  ROM14:    load = ROM14,    type = ro,  optional = yes;

  #fixed prg-rom
  CODE:     load = ROM15, type = ro,  optional = yes;

  #vectors
  VECTORS:  load = ROMV,     type = ro,  optional = yes;
}
