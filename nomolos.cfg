MEMORY {
HEADER: start = $0, size = $10, file = %O, fill = no;
ZP:  start = $0, size = $100, type = rw, define = no, fill = no;
STACK: start = $0100, size = $100, type = rw, define = no, fill = no;
RAM: start = $0200, size = $800, type = rw, define = no, fill = no;
ROM0_MEM: start = $8000, size = $4000, file = %O ,fill = yes, define = yes;
ROM1_MEM: start = $8000, size = $4000, file = %O ,fill = yes, define = yes;
ROM2: start = $8000, size = $4000, file = %O ,fill = yes, define = yes;
ROMFIXED: start = $c000, size = $3ffa, file = %O, fill = yes, define = yes;
ROMV: start = $fffa, size = $6, file = %O, fill = no, define = yes;
CHRROM0_BG: start = $0, size = $1000, file = %O, fill = yes;
CHRROM0_SPR: start = $1000, size = $1000, file = %O, fill = yes;
CHRROM1_BG: start = $0, size = $1000, file = %O, fill = yes;
CHRROM1_SPR: start = $1000, size = $1000, file = %O, fill = yes;
}

SEGMENTS {
HEADER:   load = HEADER,          type = ro               , optional = yes;
STACK:    load = STACK,           type = bss,  define = yes, optional = yes;
BSS:      load = RAM,             type = bss,  define = yes, optional = yes;
ROM0:     load = ROM0_MEM,            type = ro,  define = yes, optional = yes;
ROM1:     load = ROM1_MEM,            type = ro,  define = yes, optional = yes;
CODE:     load = ROMFIXED,            type = ro,  define = yes, optional = yes;
VECTORS:  load = ROMV,            type = ro,  define = yes, optional = yes;
CHRROM0_BG:   load = CHRROM0_BG,          type = ro,  define = yes, optional = yes;
CHRROM0_SPR:   load = CHRROM0_SPR,          type = ro,  define = yes, optional = yes;
CHRROM1_BG:   load = CHRROM1_BG,          type = ro,  define = yes, optional = yes;
CHRROM1_SPR:   load = CHRROM1_SPR,          type = ro,  define = yes, optional = yes;
ZEROPAGE: load = ZP,              type = zp,                optional = yes;
}

